services:
  ir-sentinel:
    build: .
    image: ir-sentinel:local
    container_name: ir-sentinel
    pid: host
    network_mode: host
    read_only: true
    cap_add:
      - SYS_PTRACE
      - DAC_READ_SEARCH
    volumes:
      - /proc:/host/proc:ro
      - /etc:/host/etc:ro
      - /var/log:/host/var/log:ro
    restart: unless-stopped
